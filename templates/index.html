<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empathy Engine</title>
  <style>
    :root {
      --bg: #f2f4f7;
      --panel: #ffffff;
      --ink: #101828;
      --muted: #475467;
      --accent: #0f766e;
      --error: #b42318;
      --border: #d0d5dd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #e4f9f5, var(--bg));
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(960px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(16, 24, 40, 0.08);
    }

    h1 { margin-top: 0; }

    textarea {
      width: 100%;
      min-height: 140px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      resize: vertical;
      font-size: 15px;
    }

    .toolbar {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
    }

    button[disabled] {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #d1fae5;
      border-top-color: #065f46;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .spinner.active { display: inline-block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error {
      margin-top: 14px;
      color: var(--error);
      font-weight: 600;
      min-height: 20px;
    }

    .results {
      margin-top: 20px;
      display: grid;
      gap: 12px;
    }

    .sentence-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #fcfcfd;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .emotions {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    audio {
      width: 100%;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Empathy Engine</h1>
    <textarea id="textInput" placeholder="Enter text to synthesize with affective prosody..."></textarea>

    <div class="toolbar">
      <button id="generateBtn">Generate</button>
      <span id="spinner" class="spinner" aria-hidden="true"></span>
    </div>

    <div id="error"></div>

    <audio id="audioPlayer" controls></audio>

    <section id="results" class="results"></section>
  </main>

  <script src="/static/js/app.js?v=20260301"></script>
</body>
</html>
